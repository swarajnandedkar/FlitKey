name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to receive the Windows installer (optional)"
        required: false
        type: string
  pull_request:
    paths:
      - "assets/**"
      - "installer/**"
      - "requirements-windows.txt"
      - "build_windows.py"
      - "run.py"
      - "text_expander/**"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-windows.txt

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          if (-not ($candidates | Where-Object { Test-Path $_ })) {
            choco install innosetup --yes --no-progress
          }

      - name: Decode Code Signing Certificate (Optional)
        if: ${{ secrets.CODESIGN_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.CODESIGN_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $certBytes)
          Write-Host "Code signing certificate loaded into runner temporary path."

      - name: Build installer
        shell: pwsh
        env:
          CODESIGN_CERT_PATH: ${{ secrets.CODESIGN_CERT_BASE64 != '' && format('{0}\certificate.pfx', runner.temp) || '' }}
          CODESIGN_CERT_PASSWORD: ${{ secrets.CODESIGN_CERT_PASSWORD }}
        run: python build_windows.py


      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlitKey-Windows-x64
          path: dist/windows/FlitKey-Setup-*-x64.exe
          if-no-files-found: error

      - name: Create or update GitHub release with installer
        if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          $exe = (Get-ChildItem "dist/windows/FlitKey-Setup-*-x64.exe").FullName
          if (gh release view "$env:RELEASE_TAG" 2>$null) {
            gh release upload "$env:RELEASE_TAG" "$exe" --clobber
          } else {
            gh release create "$env:RELEASE_TAG" "$exe" --title "FlitKey $env:RELEASE_TAG" --notes "FlitKey Release $env:RELEASE_TAG"
          }


