name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to receive the Windows installer (optional)"
        required: false
        type: string
  pull_request:
    paths:
      - "assets/**"
      - "installer/**"
      - "requirements-windows.txt"
      - "build_windows.py"
      - "run.py"
      - "text_expander/**"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-windows.txt

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          if (-not ($candidates | Where-Object { Test-Path $_ })) {
            choco install innosetup --yes --no-progress
          }

      - name: Build installer
        run: python build_windows.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlitKey-Windows-x64
          path: dist/windows/FlitKey-Setup-*-x64.exe
          if-no-files-found: error

      - name: Upload installer to GitHub release
        if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: gh release upload "$env:RELEASE_TAG" (Get-ChildItem "dist/windows/FlitKey-Setup-*-x64.exe").FullName --clobber
